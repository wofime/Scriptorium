        <div class="sidebar-actions"><button class="sidebar-btn" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button><button class="sidebar-btn" id="importBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import</button><button class="sidebar-btn full-width" id="undoBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 2.83-6.36L3 7"/></svg>Annuler</button></div>

    <script>
        const STORAGE_KEY = 'scriptorium_v4'; const HISTORY_KEY = 'scriptorium_history_v4'; const $ = id => document.getElementById(id); const pageId = 'objets';
        let state = { characters: [], places: [], objects: [], encyclopedia: [], glossary: [], magicTypes: [], chapters: [{ id: 'ch1', title: 'Chapitre 1', notes: [] }] }; let history = []; let hideSecrets = true; let focusMode = false; let editingObjectId = null; let pageMap = {};
        const escapeHtml = t => { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }; const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } function showToast(msg) { const t = $('toast'); $('toastMessage').textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800); }
        function load() { const saved = localStorage.getItem(STORAGE_KEY); if (saved) { try { state = { ...state, ...JSON.parse(saved) }; if (!state.magicTypes) state.magicTypes = []; } catch(e) { console.error(e); } } const theme = localStorage.getItem('scriptorium_theme'); if (theme) { document.body.setAttribute('data-theme', theme); updateThemeIcon(theme); } }
        function recordHistory() { history.push(JSON.stringify(state)); if (history.length > 30) history.shift(); localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }
        function undo() { if (history.length === 0) { showToast('Rien a annuler'); return; } state = JSON.parse(history.pop()); save(); localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); editingObjectId = null; $('objectForm').reset(); $('objectFormTitle').textContent = 'Nouvel objet'; $('cancelObjectEditBtn').style.display = 'none'; renderAll(); showToast('Action annulee'); }
        
        // FALLBACK MENU RESTAURE
        function buildNavigation() {
            const nav = $('navSection'); if (!nav) return;
            // Si le fichier config manque, on utilise cette liste par défaut
            const defaultPages = [
                { id: 'personnages', label: 'Personnages', file: 'personnages.html', section: 'Monde' },
                { id: 'lieux', label: 'Lieux', file: 'lieux.html', section: 'Monde' },
                { id: 'objets', label: 'Objets', file: 'objets.html', section: 'Monde' },
                { id: 'encyclopedie', label: 'Encyclopédie', file: 'encyclopedie.html', section: 'Monde' },
                { id: 'glossaire', label: 'Glossaire', file: 'glossaire.html', section: 'Monde' },
                { id: 'magie', label: 'Magie', file: 'magie.html', section: 'Monde' },
                { id: 'connexion', label: 'Connexion', file: 'connexion.html', section: 'Partage' },
                { id: 'chronologie', label: 'Chronologie', file: 'chronologie.html', section: 'Histoire' }
            ];
            
            const pages = (typeof SCRIPTORIUM_PAGES !== 'undefined') ? SCRIPTORIUM_PAGES : defaultPages;
            const icons = (typeof iconMap !== 'undefined') ? iconMap : {};

            pageMap = Object.fromEntries(pages.map(p => [p.id, p]));
            const groups = {};
            pages.forEach(p => { if (!groups[p.section]) groups[p.section] = []; groups[p.section].push(p); });
            let html = '';
            for (const s in groups) { html += `<div class="nav-label">${escapeHtml(s)}</div>`; groups[s].forEach(p => { const isActive = (p.id === pageId) ? ' active' : ''; const iconSvg = icons[p.id] || ''; html += `<button class="nav-item${isActive}" onclick="navigateTo('${p.id}')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconSvg}</svg>${escapeHtml(p.label)}</button>`; }); }
            nav.innerHTML = html;
        }
        
        function navigateTo(id) { if (pageMap[id]) window.location.href = pageMap[id].file; } window.navigateTo = navigateTo;
        function updateThemeIcon(theme) { const icon = $('themeIcon'); icon.innerHTML = theme === 'dark' ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>' : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'; }
        function toggleTheme() { const curr = document.body.getAttribute('data-theme') || 'light'; const next = curr === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('scriptorium_theme', next); updateThemeIcon(next); }
        function toggleFocus() { focusMode = !focusMode; $('sidebar').classList.toggle('hidden', focusMode); $('mainContent').classList.toggle('expanded', focusMode); $('focusModeBtn').classList.toggle('active', focusMode); $('objectFormContainer').classList.toggle('hidden', focusMode); }
        function toggleSecrets() { hideSecrets = !hideSecrets; $('secretsToggleBtn').classList.toggle('active', hideSecrets); renderObjects(); }
        function updateStats() { $('objectCountBadge').textContent = state.objects.length; }
        function getPlaceName(id) { const p = state.places.find(p => p.id === id); return p ? p.name : null; } function getCharName(id) { const c = state.characters.find(c => c.id === id); return c ? c.name : null; }
        function populateSelects() { $('objectOwner').innerHTML = '<option value="">Inconnu</option>' + state.characters.map(c => '<option value="' + c.id + '">' + escapeHtml(c.name || 'Sans nom') + '</option>').join(''); $('objectLocation').innerHTML = '<option value="">Inconnue</option>' + state.places.map(p => '<option value="' + p.id + '">' + escapeHtml(p.name || 'Sans nom') + '</option>').join(''); }
        function createSecretBlock(secret) { if (!secret || !secret.trim()) return null; const block = document.createElement('div'); block.className = 'secret-block has-secret' + (hideSecrets ? ' is-blurred' : ''); block.innerHTML = '<p class="card-text">' + escapeHtml(secret) + '</p>'; if (hideSecrets) block.addEventListener('click', () => block.classList.add('revealed')); return block; }
        function renderObjects() { const grid = $('objectsGrid'); if (!grid) return; const empty = $('objectsEmpty'); const q = $('searchInput').value.toLowerCase(); const filtered = state.objects.filter(o => (o.name || '').toLowerCase().includes(q) || (o.type || '').toLowerCase().includes(q) || (o.description || '').toLowerCase().includes(q)); grid.innerHTML = ''; empty.style.display = filtered.length ? 'none' : 'block'; filtered.forEach(o => { const owner = getCharName(o.ownerId); const loc = getPlaceName(o.locationId); const card = document.createElement('div'); card.className = 'card'; let html = '<div class="card-header"><div><h3 class="card-name">' + escapeHtml(o.name || 'Sans nom') + '</h3>'; if (o.type) html += '<span class="card-tag">' + escapeHtml(o.type) + '</span>'; html += '</div><div class="card-actions"><button class="btn btn-icon btn-secondary" onclick="editObject(\'' + o.id + '\')" title="Modifier"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn btn-icon btn-danger" onclick="deleteObject(\'' + o.id + '\')" title="Supprimer"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></div><div class="card-body">'; if (o.description) html += '<div class="card-section"><div class="card-label">Description</div><p class="card-text">' + escapeHtml(o.description) + '</p></div>'; if (owner || loc) html += '<div class="card-section"><div class="card-label">Liens</div>' + (owner ? '<span class="link-tag" onclick="navigateTo(\'personnages\')">' + escapeHtml(owner) + '</span>' : '') + (loc ? '<span class="link-tag" onclick="navigateTo(\'lieux\')">' + escapeHtml(loc) + '</span>' : '') + '</div>'; html += '</div>'; card.innerHTML = html; if (o.secret && o.secret.trim()) { const sb = createSecretBlock(o.secret); if (sb) card.querySelector('.card-body').appendChild(sb); } grid.appendChild(card); }); }
        function renderAll() { populateSelects(); renderObjects(); updateStats(); }
        $('objectForm').addEventListener('submit', e => { e.preventDefault(); recordHistory(); const obj = { id: editingObjectId || generateId(), name: $('objectName').value.trim(), type: $('objectType').value.trim(), ownerId: $('objectOwner').value || null, locationId: $('objectLocation').value || null, description: $('objectDescription').value.trim(), secret: $('objectSecret').value.trim() }; if (editingObjectId) { const idx = state.objects.findIndex(o => o.id === editingObjectId); if (idx !== -1) state.objects[idx] = obj; } else { state.objects.push(obj); } save(); renderAll(); e.target.reset(); editingObjectId = null; $('objectFormTitle').textContent = 'Nouvel objet'; $('cancelObjectEditBtn').style.display = 'none'; showToast(editingObjectId ? 'Objet modifié' : 'Objet ajouté'); });
        $('cancelObjectEditBtn').addEventListener('click', () => { $('objectForm').reset(); editingObjectId = null; $('objectFormTitle').textContent = 'Nouvel objet'; $('cancelObjectEditBtn').style.display = 'none'; });
        window.editObject = function(id) { const o = state.objects.find(o => o.id === id); if (!o) return; editingObjectId = id; $('objectName').value = o.name || ''; $('objectType').value = o.type || ''; $('objectOwner').value = o.ownerId || ''; $('objectLocation').value = o.locationId || ''; $('objectDescription').value = o.description || ''; $('objectSecret').value = o.secret || ''; $('objectFormTitle').textContent = 'Modifier l\'objet'; $('cancelObjectEditBtn').style.display = 'inline-flex'; $('objectFormContainer').scrollIntoView({ behavior: 'smooth' }); };
        window.deleteObject = function(id) { if (confirm('Supprimer cet objet ?')) { recordHistory(); state.objects = state.objects.filter(o => o.id !== id); save(); renderAll(); showToast('Objet supprimé'); } };
        $('themeToggleBtn').addEventListener('click', toggleTheme); $('focusModeBtn').addEventListener('click', toggleFocus); $('secretsToggleBtn').addEventListener('click', toggleSecrets); $('undoBtn').addEventListener('click', undo); $('searchInput').addEventListener('input', renderObjects); $('mobileMenuBtn').addEventListener('click', () => $('sidebar').classList.add('open')); $('mobileOverlay').addEventListener('click', () => $('sidebar').classList.remove('open'));
        $('exportBtn').addEventListener('click', () => { const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scriptorium_' + new Date().toISOString().slice(0,10) + '.json'; a.click(); showToast('Grimoire exporté'); });
        $('importBtn').addEventListener('click', () => $('importInput').click());
        $('importInput').addEventListener('change', e => { if (!e.target.files[0]) return; const fr = new FileReader(); fr.onload = ev => { try { state = { ...state, ...JSON.parse(ev.target.result) }; save(); renderAll(); showToast('Grimoire importé'); } catch(_) { showToast('Erreur d\'import'); } }; fr.readAsText(e.target.files[0]); });
        load(); buildNavigation(); renderAll();
    </script>
