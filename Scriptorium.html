<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scriptorium - L'Atelier de l'Ecrivain</title>
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/wofime/Scriptorium/main/logo%20Scriptorium.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,500;0,700;1,300;1,500&display=swap" rel="stylesheet">
  <style>
    /* Variables identiques au reste du site */
    :root {
      --bg-primary: #f4ede4;
      --bg-secondary: #e8dfd3;
      --bg-card: rgba(244, 237, 228, 0.9);
      --fg-primary: #2c2418;
      --fg-secondary: #5c4f3d;
      --fg-muted: #8b7d68;
      --accent-gold: #c9a227;
      --accent-copper: #b87333;
      --border-light: rgba(44, 36, 24, 0.12);
      --border-medium: rgba(44, 36, 24, 0.25);
      --shadow-warm: rgba(139, 105, 20, 0.12);
      
      /* Couleur officielle Discord */
      --discord-blue: #5865F2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Texture de fond identique au reste du site */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.022;
      pointer-events: none;
      z-index: 0;
    }

    /* Conteneur principal */
    .landing {
      width: min(900px, 100%);
      position: relative;
      z-index: 1;
      padding: clamp(2rem, 5vw, 3.5rem);
      border: 1px solid var(--border-light);
      border-radius: 12px; /* Arrondi standard du site */
      background: var(--bg-card);
      box-shadow: 0 14px 28px var(--shadow-warm);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-family: 'Spectral', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-gold);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .tagline {
      color: var(--fg-secondary);
      font-size: clamp(1rem, 2.2vw, 1.15rem);
      line-height: 1.6;
      max-width: 60ch;
      margin: 0 auto 2.5rem auto;
    }

    /* Conteneur des boutons */
    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    /* Bouton principal (Or) */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      text-decoration: none;
      font-family: 'Spectral', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-copper) 100%);
      border: 1px solid rgba(44, 36, 24, 0.24);
      border-radius: 5px; /* Style bouton standard du site */
      padding: 0.85rem 2rem;
      box-shadow: 0 2px 8px rgba(201, 162, 39, 0.28);
      transition: all 0.22s ease;
      min-width: 280px;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 16px rgba(201, 162, 39, 0.35);
    }

    /* Bouton Discord (Bleu) */
    .cta-discord {
      background: var(--discord-blue);
      color: #fff;
      border: none;
      box-shadow: 0 2px 8px rgba(88, 101, 242, 0.3);
    }

    .cta-discord:hover {
      background: #4752C4; /* Légèrement plus foncé au survol */
      box-shadow: 0 5px 16px rgba(88, 101, 242, 0.4);
      transform: translateY(-2px);
    }

    .cta-discord svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .landing {
        padding: 1.5rem;
      }
      .cta {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <main class="landing">
    <h1>Bienvenue dans Scriptorium</h1>
    <p class="tagline">
      Organisez votre univers, structurez votre intrigue et donnez vie à vos personnages dans un atelier d'écriture pensé pour créer, relire et faire évoluer votre récit.
    </p>
    
    <div class="actions">
      <a class="cta" id="enterSiteButton" href="personnages.html">
        Entrer dans l'atelier
      </a>
      
      <a class="cta cta-discord" id="discordButton" href="https://discord.gg/sgHU3Njz" target="_blank" rel="noopener noreferrer">
        <!-- Logo Discord SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Rejoindre le Discord
      </a>
    </div>
  </main>
</body>
</html>
