<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scriptorium - Accueil</title>
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/wofime/Scriptorium/main/logo%20Scriptorium.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,500;0,700;1,300;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f4ede4;
      --bg-secondary: #e8dfd3;
      --bg-card: rgba(244, 237, 228, 0.9);
      --fg-primary: #2c2418;
      --fg-secondary: #5c4f3d;
      --fg-muted: #8b7d68;
      --accent-gold: #c9a227;
      --accent-copper: #b87333;
      --border-light: rgba(44, 36, 24, 0.12);
      --border-medium: rgba(44, 36, 24, 0.25);
      --shadow-warm: rgba(139, 105, 20, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(201, 162, 39, 0.12) 0%, rgba(201, 162, 39, 0) 45%),
        radial-gradient(circle at 80% 85%, rgba(184, 115, 51, 0.08) 0%, rgba(184, 115, 51, 0) 42%),
        var(--bg-primary);
      color: var(--fg-primary);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
      z-index: 0;
    }

    .landing {
      width: min(900px, 100%);
      position: relative;
      z-index: 1;
      padding: clamp(1.5rem, 3vw, 2.5rem);
      border: 1px solid var(--border-light);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.78), var(--bg-card));
      box-shadow:
        0 28px 65px rgba(44, 36, 24, 0.1),
        0 8px 22px var(--shadow-warm);
      text-align: center;
    }

    h1 {
      margin-top: 1rem;
      font-family: 'Spectral', serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-gold);
      font-size: clamp(1.9rem, 4.8vw, 3.2rem);
      line-height: 1.15;
    }

    .tagline {
      margin-top: 0.85rem;
      color: var(--fg-secondary);
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      line-height: 1.6;
      max-width: 65ch;
      margin-inline: auto;
    }

    .cta {
      margin-top: 1.7rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      text-decoration: none;
      font-family: 'Spectral', serif;
      font-size: clamp(1rem, 2.2vw, 1.1rem);
      font-weight: 700;
      color: #20190f;
      background: linear-gradient(180deg, #d9b340 0%, #c9a227 100%);
      border: 1px solid rgba(44, 36, 24, 0.24);
      border-radius: 999px;
      padding: 0.85rem 1.45rem;
      box-shadow: 0 10px 20px rgba(139, 105, 20, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(139, 105, 20, 0.35);
      filter: saturate(1.05);
      outline: none;
    }


    .cta-discord {
      margin-top: 0.8rem;
      background: transparent;
      color: var(--fg-primary);
      border: 1px solid var(--border-medium);
      box-shadow: none;
    }

    .cta-discord:hover,
    .cta-discord:focus-visible {
      box-shadow: 0 10px 20px rgba(44, 36, 24, 0.14);
      filter: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }

      .landing {
        border-radius: 14px;
      }

      .tagline {
        line-height: 1.5;
      }

      .cta {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="landing">
    <h1>Bienvenue dans Scriptorium</h1>
    <p class="tagline">
      Organisez votre univers, structurez votre intrigue et donnez vie à vos personnages dans un atelier d'écriture pensé pour créer, relire et faire évoluer votre récit.
    </p>
    <a class="cta" id="enterSiteButton" href="personnages.html">Entrer dans l'atelier</a>
    <a class="cta cta-discord" id="discordButton" href="https://discord.gg/sgHU3Njz" target="_blank" rel="noopener noreferrer">Rejoindre le Discord</a>
  </main>

</body>
</html>
