<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scriptorium - Magie</title>
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/wofime/Scriptorium/main/logo%20Scriptorium.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,500;0,700;1,300;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f4ede4;
      --bg-secondary: #e8dfd3;
      --bg-card: rgba(244, 237, 228, 0.9);
      --bg-form: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(248, 243, 236, 0.85) 100%);
      --fg-primary: #2c2418;
      --fg-secondary: #5c4f3d;
      --fg-muted: #8b7d68;
      --accent-gold: #c9a227;
      --border-light: rgba(44, 36, 24, 0.12);
      --border-medium: rgba(44, 36, 24, 0.25);
      --shadow-warm: rgba(139, 105, 20, 0.12);
      --sidebar-bg: #231d15;
      --sidebar-fg: #e8dfd3;
      --input-bg: rgba(255, 255, 255, 0.75);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      min-height: 100vh;
    }

    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0a0806 100%);
      border-right: 1px solid rgba(201, 162, 39, 0.18);
      color: var(--sidebar-fg);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header { padding: 1.3rem 1.15rem; border-bottom: 1px solid rgba(201, 162, 39, 0.12); }
    .logo { font-family: 'Spectral', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent-gold); letter-spacing: .08em; text-transform: uppercase; }
    .logo-subtitle { font-size: .7rem; color: var(--fg-muted); font-style: italic; margin-top: .15rem; }

    .sidebar-actions {
      padding: .65rem .95rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .3rem;
      border-bottom: 1px solid rgba(201, 162, 39, 0.08);
    }

    .sidebar-btn {
      display: flex; align-items: center; justify-content: center;
      gap: .22rem; padding: .42rem .45rem;
      background: rgba(201, 162, 39, .06);
      border: 1px solid rgba(201, 162, 39, .18);
      border-radius: 5px; color: var(--sidebar-fg); font-size: .72rem;
      cursor: pointer; transition: all .2s ease;
    }
    .sidebar-btn:hover { background: rgba(201, 162, 39, .12); color: var(--accent-gold); }
    .sidebar-btn.full-width { grid-column: 1 / -1; }

    .nav-section { padding: .55rem 0; flex: 1; overflow-y: auto; }
    .nav-label {
      padding: .32rem 1.15rem;
      font-size: .56rem;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: var(--fg-muted);
      margin-top: .35rem;
    }

    .nav-item {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem 1.15rem;
      color: var(--sidebar-fg);
      cursor: pointer;
      border: none; background: transparent; width: 100%; text-align: left;
      font-family: inherit; font-size: .85rem;
      position: relative;
    }
    .nav-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent-gold); transform: scaleY(0); transition: transform .2s ease;
    }
    .nav-item:hover, .nav-item.active { background: rgba(201, 162, 39, .1); color: var(--accent-gold); }
    .nav-item.active::before { transform: scaleY(1); }

    .sidebar-stats {
      padding: .6rem 1.15rem;
      border-top: 1px solid rgba(201, 162, 39, .12);
      background: rgba(0, 0, 0, .22);
    }
    .stat-item { display: flex; justify-content: space-between; padding: .22rem 0; color: var(--fg-muted); font-size: .75rem; }
    .stat-value { color: var(--accent-gold); font-weight: 600; font-family: 'Spectral', serif; }

    .main-content { flex: 1; padding: 1.2rem; }
    .top-bar {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: .6rem .9rem;
      margin-bottom: 1rem;
      color: var(--fg-secondary);
    }

    .content {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      box-shadow: 0 8px 24px var(--shadow-warm);
      overflow: hidden;
    }
    .content-header { padding: 1rem 1.1rem .8rem; border-bottom: 1px solid var(--border-light); }
    .page-title { font-family: 'Spectral', serif; font-size: 1.8rem; color: var(--accent-gold); }
    .page-subtitle { color: var(--fg-secondary); margin-top: .15rem; }

    .content-body { padding: 1rem 1.1rem; }
    .form-grid {
      background: var(--bg-form);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 1rem;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: .8rem;
    }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { color: var(--fg-secondary); font-size: .9rem; }
    .form-input, .form-select, .form-textarea {
      background: var(--input-bg);
      border: 1px solid var(--border-medium);
      border-radius: 9px;
      padding: .55rem .65rem;
      font-family: inherit;
      color: var(--fg-primary);
    }
    .form-textarea { min-height: 88px; resize: vertical; }

    .actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .6rem; }
    .btn {
      border: 1px solid var(--border-medium);
      border-radius: 9px;
      padding: .55rem .85rem;
      background: rgba(255,255,255,.75);
      color: var(--fg-primary);
      cursor: pointer;
    }
    .btn.primary {
      background: linear-gradient(180deg, rgba(201,162,39,.24), rgba(201,162,39,.14));
      border-color: rgba(201,162,39,.45);
      font-weight: 600;
    }

    .cards { margin-top: 1rem; display: grid; gap: .75rem; }
    .card {
      border: 1px solid var(--border-light);
      border-radius: 12px;
      background: rgba(255, 255, 255, .72);
      padding: .8rem;
    }
    .card-head { display: flex; justify-content: space-between; gap: .6rem; align-items: baseline; }
    .card-title { font-family: 'Spectral', serif; font-size: 1.08rem; }
    .badge { font-size: .75rem; background: rgba(201,162,39,.16); color: #6b4f12; border-radius: 999px; padding: .12rem .5rem; }
    .card p { margin-top: .25rem; color: var(--fg-secondary); }
    .empty { margin-top: .8rem; color: var(--fg-muted); }

    @media (max-width: 940px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="magie">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">Scriptorium</div>
        <div class="logo-subtitle">L'atelier de l'ecrivain</div>
      </div>

      <div class="sidebar-actions">
        <button class="sidebar-btn" id="exportBtn">Export</button>
        <button class="sidebar-btn" id="importBtn">Import</button>
        <button class="sidebar-btn full-width" id="undoBtn">Annuler</button>
      </div>

      <nav class="nav-section" id="navSection"></nav>

      <div class="sidebar-stats">
        <div class="stat-item"><span>Sorts</span><span class="stat-value" id="spellCount">0</span></div>
        <div class="stat-item"><span>Types uniques</span><span class="stat-value" id="typeCount">0</span></div>
      </div>
    </aside>

    <main class="main-content">
      <div class="top-bar">Grimoire des sorts et types de magie</div>

      <section class="content">
        <header class="content-header">
          <h1 class="page-title">Magie</h1>
          <p class="page-subtitle">Référence des écoles, sorts et contraintes magiques.</p>
        </header>

        <div class="content-body">
          <form id="magicForm" class="form-grid">
            <div class="form-group">
              <label class="form-label" for="name">Nom du sort</label>
              <input id="name" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="type">Type de magie</label>
              <input id="type" class="form-input" placeholder="Elementaire, runique, sacrée..." required>
            </div>
            <div class="form-group">
              <label class="form-label" for="level">Niveau</label>
              <select id="level" class="form-select">
                <option>Débutant</option>
                <option>Intermédiaire</option>
                <option>Avancé</option>
                <option>Légendaire</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="cost">Coût</label>
              <input id="cost" class="form-input" placeholder="Mana, artefact, rituel...">
            </div>
            <div class="form-group full">
              <label class="form-label" for="effect">Effet</label>
              <textarea id="effect" class="form-textarea" placeholder="Décris l'effet principal"></textarea>
            </div>
            <div class="form-group full">
              <label class="form-label" for="limits">Limites</label>
              <textarea id="limits" class="form-textarea" placeholder="Faiblesses, contreparties, conditions"></textarea>
            </div>
          </form>

          <div class="actions">
            <button class="btn primary" id="addBtn">Ajouter le sort</button>
            <button class="btn" id="clearBtn">Tout supprimer</button>
          </div>

          <div class="cards" id="list"></div>
          <p class="empty" id="empty">Aucun sort enregistré pour le moment.</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const PAGE_ID = 'magie';
    const STORAGE_KEY = 'scriptorium_magic_v1';
    const HISTORY_KEY = 'scriptorium_magic_history_v1';

    const $ = (id) => document.getElementById(id);
    const form = $('magicForm');
    const listEl = $('list');
    const emptyEl = $('empty');

    let items = load(STORAGE_KEY, []);
    let history = load(HISTORY_KEY, []);

    function load(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-50)));
      updateStats();
    }

    function snapshot() {
      history.push(JSON.parse(JSON.stringify(items)));
      if (history.length > 50) history.shift();
    }

    function esc(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function render() {
      listEl.innerHTML = items.map((item, index) => `
        <article class="card">
          <div class="card-head">
            <h3 class="card-title">${esc(item.name)}</h3>
            <span class="badge">${esc(item.level)} • ${esc(item.type)}</span>
          </div>
          <p><strong>Coût :</strong> ${esc(item.cost || '-')}</p>
          <p><strong>Effet :</strong> ${esc(item.effect || '-')}</p>
          <p><strong>Limites :</strong> ${esc(item.limits || '-')}</p>
          <div class="actions">
            <button class="btn" onclick="removeSpell(${index})">Supprimer</button>
          </div>
        </article>
      `).join('');

      emptyEl.style.display = items.length ? 'none' : 'block';
    }

    function updateStats() {
      $('spellCount').textContent = String(items.length);
      $('typeCount').textContent = String(new Set(items.map((i) => (i.type || '').toLowerCase()).filter(Boolean)).size);
    }

    window.removeSpell = (index) => {
      snapshot();
      items.splice(index, 1);
      saveState();
      render();
    };

    $('addBtn').addEventListener('click', () => {
      if (!form.reportValidity()) return;
      snapshot();
      items.unshift({
        name: form.name.value.trim(),
        type: form.type.value.trim(),
        level: form.level.value,
        cost: form.cost.value.trim(),
        effect: form.effect.value.trim(),
        limits: form.limits.value.trim()
      });
      form.reset();
      saveState();
      render();
    });

    $('clearBtn').addEventListener('click', () => {
      if (!items.length) return;
      if (!confirm('Supprimer tous les sorts ?')) return;
      snapshot();
      items = [];
      saveState();
      render();
    });

    $('undoBtn').addEventListener('click', () => {
      if (!history.length) return;
      items = history.pop();
      saveState();
      render();
    });

    $('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify({ magie: items }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'scriptorium-magie.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    $('importBtn').addEventListener('click', async () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json,application/json';
      input.onchange = async () => {
        const file = input.files?.[0];
        if (!file) return;
        const text = await file.text();
        try {
          const data = JSON.parse(text);
          const imported = Array.isArray(data.magie) ? data.magie : [];
          snapshot();
          items = imported;
          saveState();
          render();
        } catch {
          alert('Fichier invalide');
        }
      };
      input.click();
    });

    async function buildNavigation() {
      const fallbackPages = [
        { id: 'personnages', label: 'Personnages', file: 'personnages.html', section: 'Monde' },
        { id: 'lieux', label: 'Lieux', file: 'lieux.html', section: 'Monde' },
        { id: 'objets', label: 'Objets', file: 'objets.html', section: 'Monde' },
        { id: 'encyclopedie', label: 'Encyclopedie', file: 'encyclopedie.html', section: 'Monde' },
        { id: 'glossaire', label: 'Glossaire', file: 'glossaire.html', section: 'Monde' },
        { id: 'magie', label: 'Magie', file: 'magie.html', section: 'Monde' },
        { id: 'chronologie', label: 'Chronologie', file: 'chronologie.html', section: 'Histoire' }
      ];

      let pages = fallbackPages;
      try {
        const res = await fetch('pages.json', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.pages) && data.pages.length) pages = data.pages;
        }
      } catch {}

      const nav = $('navSection');
      if (!nav) return;

      const grouped = pages.reduce((acc, p) => {
        const section = p.section || 'Autre';
        (acc[section] ||= []).push(p);
        return acc;
      }, {});

      nav.innerHTML = Object.entries(grouped).map(([section, sectionPages]) => `
        <div class="nav-label">${section}</div>
        ${sectionPages.map((p) => `<button class="nav-item ${p.id === PAGE_ID ? 'active' : ''}" data-file="${p.file}">${p.label}</button>`).join('')}
      `).join('');

      nav.querySelectorAll('.nav-item').forEach((btn) => {
        btn.addEventListener('click', () => {
          const file = btn.dataset.file;
          if (file) window.location.href = file;
        });
      });
    }

    buildNavigation();
    updateStats();
    render();
  </script>
</body>
</html>
