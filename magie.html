<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scriptorium - Magie</title>
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/wofime/Scriptorium/main/logo%20Scriptorium.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,500;0,700;1,300;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f4ede4;
      --bg-card: rgba(255, 255, 255, 0.76);
      --fg-primary: #2c2418;
      --fg-secondary: #5c4f3d;
      --fg-muted: #8b7d68;
      --accent-gold: #c9a227;
      --border-light: rgba(44, 36, 24, 0.12);
      --border-medium: rgba(44, 36, 24, 0.25);
      --sidebar-bg: #231d15;
      --sidebar-fg: #e8dfd3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 250px 1fr;
    }

    .sidebar {
      background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0a0806 100%);
      color: var(--sidebar-fg);
      border-right: 1px solid rgba(201, 162, 39, 0.18);
      padding: 1.2rem 0;
    }

    .logo {
      font-family: 'Spectral', serif;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 1.1rem;
      padding: 0 1rem 1rem;
      border-bottom: 1px solid rgba(201, 162, 39, .12);
      margin-bottom: .8rem;
    }

    .nav-item {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--sidebar-fg);
      text-align: left;
      padding: .55rem 1rem;
      cursor: pointer;
      font-family: inherit;
      font-size: .95rem;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(201,162,39,.12);
      color: var(--accent-gold);
    }

    .main {
      padding: clamp(1rem, 2.8vw, 2rem);
    }

    .panel {
      max-width: 980px;
      margin: 0 auto;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      box-shadow: 0 14px 28px rgba(0,0,0,.07);
      padding: clamp(1rem, 2.5vw, 1.5rem);
    }

    h1 {
      font-family: 'Spectral', serif;
      color: var(--accent-gold);
      font-size: clamp(1.5rem, 3.2vw, 2rem);
      margin-bottom: .4rem;
    }

    .subtitle {
      color: var(--fg-secondary);
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: .8rem;
      margin-bottom: .8rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }

    label { font-size: .9rem; color: var(--fg-secondary); }

    input, textarea, select {
      border: 1px solid var(--border-medium);
      border-radius: 10px;
      padding: .6rem .7rem;
      font-family: inherit;
      background: rgba(255,255,255,.85);
      color: var(--fg-primary);
    }

    textarea { min-height: 92px; resize: vertical; }

    .actions {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      margin-top: .5rem;
    }

    .btn {
      border: 1px solid var(--border-medium);
      background: #fff7df;
      color: var(--fg-primary);
      border-radius: 10px;
      padding: .55rem .9rem;
      cursor: pointer;
      font-family: inherit;
    }

    .btn.primary {
      background: linear-gradient(180deg, #d9b340 0%, #c9a227 100%);
      font-weight: 600;
    }

    .list {
      list-style: none;
      margin-top: 1rem;
      display: grid;
      gap: .75rem;
    }

    .item {
      border: 1px solid var(--border-light);
      border-radius: 12px;
      background: rgba(255,255,255,.8);
      padding: .8rem;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: .8rem;
      margin-bottom: .35rem;
    }

    .item h3 { font-family: 'Spectral', serif; color: var(--fg-primary); }

    .tag {
      font-size: .78rem;
      color: #6f5410;
      background: rgba(201,162,39,.18);
      border-radius: 999px;
      padding: .15rem .55rem;
    }

    .muted { color: var(--fg-muted); font-size: .9rem; }

    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid rgba(201,162,39,.18); }
    }
  </style>
</head>
<body data-page="magie">
  <aside class="sidebar">
    <div class="logo">Scriptorium</div>
    <nav id="nav"></nav>
  </aside>

  <main class="main">
    <section class="panel">
      <h1>Sorts & Types de magie</h1>
      <p class="subtitle">Crée ta banque de magie : type, coût, niveau, effet et limites.</p>

      <form id="magicForm">
        <div class="grid">
          <div class="field">
            <label for="name">Nom du sort</label>
            <input id="name" required>
          </div>
          <div class="field">
            <label for="type">Type de magie</label>
            <input id="type" placeholder="ex: élémentaire, runique, sacrée" required>
          </div>
          <div class="field">
            <label for="level">Niveau</label>
            <select id="level">
              <option>Débutant</option>
              <option>Intermédiaire</option>
              <option>Avancé</option>
              <option>Légendaire</option>
            </select>
          </div>
          <div class="field">
            <label for="cost">Coût/ressource</label>
            <input id="cost" placeholder="mana, sang, artefact...">
          </div>
        </div>

        <div class="field">
          <label for="effect">Effet</label>
          <textarea id="effect" placeholder="Décris l'effet du sort"></textarea>
        </div>

        <div class="field">
          <label for="limits">Limites / contreparties</label>
          <textarea id="limits" placeholder="Faiblesses, contraintes, risques"></textarea>
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">Ajouter le sort</button>
          <button class="btn" id="clearAll" type="button">Tout supprimer</button>
        </div>
      </form>

      <ul id="magicList" class="list"></ul>
      <p id="empty" class="muted">Aucun sort enregistré pour le moment.</p>
    </section>
  </main>

  <script>
    const PAGE_ID = 'magie';
    const STORAGE_KEY = 'scriptorium_magic_v1';
    const fallbackPages = [
      { id: 'personnages', label: 'Personnages', file: 'personnages.html', section: 'Monde' },
      { id: 'lieux', label: 'Lieux', file: 'lieux.html', section: 'Monde' },
      { id: 'objets', label: 'Objets', file: 'objets.html', section: 'Monde' },
      { id: 'encyclopedie', label: 'Encyclopedie', file: 'encyclopedie.html', section: 'Monde' },
      { id: 'glossaire', label: 'Glossaire', file: 'glossaire.html', section: 'Monde' },
      { id: 'magie', label: 'Magie', file: 'magie.html', section: 'Monde' },
      { id: 'chronologie', label: 'Chronologie', file: 'chronologie.html', section: 'Histoire' }
    ];

    const form = document.getElementById('magicForm');
    const listEl = document.getElementById('magicList');
    const emptyEl = document.getElementById('empty');
    const clearBtn = document.getElementById('clearAll');

    let items = load();

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = items.map((item, idx) => `
        <li class="item">
          <div class="item-head">
            <h3>${escapeHTML(item.name)}</h3>
            <span class="tag">${escapeHTML(item.level)} • ${escapeHTML(item.type)}</span>
          </div>
          <p><strong>Coût :</strong> ${escapeHTML(item.cost || '-')}</p>
          <p><strong>Effet :</strong> ${escapeHTML(item.effect || '-')}</p>
          <p><strong>Limites :</strong> ${escapeHTML(item.limits || '-')}</p>
          <div class="actions">
            <button class="btn" type="button" onclick="removeItem(${idx})">Supprimer</button>
          </div>
        </li>
      `).join('');
      emptyEl.style.display = items.length ? 'none' : 'block';
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    window.removeItem = (idx) => {
      items.splice(idx, 1);
      save();
      render();
    };

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      items.unshift({
        name: form.name.value.trim(),
        type: form.type.value.trim(),
        level: form.level.value,
        cost: form.cost.value.trim(),
        effect: form.effect.value.trim(),
        limits: form.limits.value.trim()
      });
      save();
      form.reset();
      render();
    });

    clearBtn.addEventListener('click', () => {
      if (!confirm('Supprimer tous les sorts ?')) return;
      items = [];
      save();
      render();
    });

    async function buildNav() {
      let pages = fallbackPages;
      try {
        const res = await fetch('pages.json', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data.pages) && data.pages.length) {
            pages = data.pages;
          }
        }
      } catch {}

      const nav = document.getElementById('nav');
      nav.innerHTML = pages
        .filter((p) => p && p.file && p.label)
        .map((p) => `<button class="nav-item ${p.id === PAGE_ID ? 'active' : ''}" data-file="${p.file}">${p.label}</button>`)
        .join('');

      nav.querySelectorAll('.nav-item').forEach((btn) => {
        btn.addEventListener('click', () => {
          window.location.href = btn.dataset.file;
        });
      });
    }

    buildNav();
    render();
  </script>
</body>
</html>
