<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptorium - Magie</title>
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/wofime/Scriptorium/main/logo%20Scriptorium.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,500;0,700;1,300;1,500&display=swap" rel="stylesheet">
    <style>
        /* CSS IDENTIQUE AU MODÈLE */
        :root {
            --bg-primary: #f4ede4;
            --bg-secondary: #e8dfd3;
            --bg-card: rgba(244, 237, 228, 0.9);
            --bg-form: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(248, 243, 236, 0.85) 100%);
            --fg-primary: #2c2418;
            --fg-secondary: #5c4f3d;
            --fg-muted: #8b7d68;
            --accent-gold: #c9a227;
            --accent-copper: #b87333;
            --accent-sepia: #8b6914;
            --border-light: rgba(44, 36, 24, 0.12);
            --border-medium: rgba(44, 36, 24, 0.25);
            --shadow-warm: rgba(139, 105, 20, 0.12);
            --sidebar-bg: #231d15;
            --sidebar-fg: #e8dfd3;
            --input-bg: rgba(255, 255, 255, 0.75);
            --cat-magic: #6b5b95;
            --cat-magic-bg: rgba(107, 91, 149, 0.12);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1714;
            --bg-secondary: #252019;
            --bg-card: rgba(35, 30, 24, 0.92);
            --bg-form: linear-gradient(135deg, rgba(45, 40, 33, 0.85) 0%, rgba(35, 30, 25, 0.92) 100%);
            --fg-primary: #e8dfd3;
            --fg-secondary: #c4b8a4;
            --fg-muted: #8a7d6a;
            --accent-gold: #d4a84b;
            --accent-copper: #cd8c4a;
            --border-light: rgba(232, 223, 211, 0.1);
            --border-medium: rgba(232, 223, 211, 0.2);
            --shadow-warm: rgba(0, 0, 0, 0.35);
            --sidebar-bg: #0f0d0a;
            --input-bg: rgba(55, 50, 43, 0.65);
            --cat-magic: #9a8ac4;
            --cat-magic-bg: rgba(154, 138, 196, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg-primary);
            color: var(--fg-primary);
            min-height: 100vh;
            transition: background 0.5s ease, color 0.4s ease;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.022; pointer-events: none; z-index: 0;
        }

        /* SIDEBAR IDENTIQUE */
        .sidebar {
            position: fixed; left: 0; top: 0;
            width: 250px; height: 100vh;
            background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0a0806 100%);
            border-right: 1px solid rgba(201, 162, 39, 0.18);
            z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        .sidebar.hidden { transform: translateX(-100%); }

        .sidebar-header { padding: 1.3rem 1.15rem; border-bottom: 1px solid rgba(201, 162, 39, 0.12); }
        .logo { font-family: 'Spectral', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent-gold); letter-spacing: 0.08em; text-transform: uppercase; }
        .logo-subtitle { font-size: 0.7rem; color: var(--fg-muted); font-style: italic; margin-top: 0.12rem; }

        .sidebar-actions { padding: 0.65rem 0.95rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; border-bottom: 1px solid rgba(201, 162, 39, 0.08); }
        .sidebar-btn { display: flex; align-items: center; justify-content: center; gap: 0.22rem; padding: 0.42rem 0.45rem; background: rgba(201, 162, 39, 0.06); border: 1px solid rgba(201, 162, 39, 0.18); border-radius: 5px; color: var(--sidebar-fg); font-family: inherit; font-size: 0.7rem; cursor: pointer; transition: all 0.22s ease; }
        .sidebar-btn:hover { background: rgba(201, 162, 39, 0.12); color: var(--accent-gold); }
        .sidebar-btn svg { width: 11px; height: 11px; }
        .sidebar-btn.full-width { grid-column: 1 / -1; }

        .nav-section { padding: 0.55rem 0; flex: 1; }
        .nav-label { padding: 0.32rem 1.15rem; font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--fg-muted); margin-top: 0.35rem; }
        .nav-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.15rem; color: var(--sidebar-fg); cursor: pointer; transition: all 0.22s ease; position: relative; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; font-size: 0.85rem; }
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent-gold); transform: scaleY(0); transition: transform 0.22s ease; }
        .nav-item:hover { background: rgba(201, 162, 39, 0.06); color: var(--accent-gold); }
        .nav-item.active { background: rgba(201, 162, 39, 0.1); color: var(--accent-gold); }
        .nav-item.active::before { transform: scaleY(1); }

        .sidebar-stats { padding: 0.6rem 1.15rem; border-top: 1px solid rgba(201, 162, 39, 0.12); background: rgba(0, 0, 0, 0.22); }
        .stat-item { display: flex; justify-content: space-between; align-items: center; padding: 0.22rem 0; color: var(--fg-muted); font-size: 0.75rem; }
        .stat-value { color: var(--accent-gold); font-weight: 600; font-family: 'Spectral', serif; }

        .main-content { margin-left: 250px; min-height: 100vh; background: var(--bg-primary); position: relative; transition: margin-left 0.4s ease; }
        .main-content.expanded { margin-left: 0; }

        .top-bar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.35rem; background: var(--bg-secondary); border-bottom: 1px solid var(--border-light); backdrop-filter: blur(10px); gap: 0.8rem; }
        .search-container { position: relative; flex: 1; max-width: 300px; }
        .search-input { width: 100%; padding: 0.42rem 0.7rem 0.42rem 1.9rem; background: var(--input-bg); border: 1px solid var(--border-medium); border-radius: 5px; font-family: inherit; font-size: 0.85rem; color: var(--fg-primary); transition: all 0.22s ease; }
        .search-input:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.08); }
        .search-icon { position: absolute; left: 0.68rem; top: 50%; transform: translateY(-50%); width: 11px; height: 11px; color: var(--fg-muted); }
        .top-actions { display: flex; gap: 0.3rem; }
        .icon-btn { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: var(--input-bg); border: 1px solid var(--border-medium); border-radius: 5px; color: var(--fg-secondary); cursor: pointer; transition: all 0.22s ease; }
        .icon-btn:hover { background: rgba(201, 162, 39, 0.08); border-color: var(--accent-gold); color: var(--accent-gold); }
        .icon-btn.active { background: rgba(201, 162, 39, 0.12); border-color: var(--accent-gold); color: var(--accent-gold); }
        .icon-btn svg { width: 14px; height: 14px; }

        .content-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-light); background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); }
        .page-title { font-family: 'Spectral', serif; font-size: 1.55rem; font-weight: 700; color: var(--fg-primary); }
        .page-subtitle { color: var(--fg-secondary); font-size: 0.88rem; margin-top: 0.2rem; font-style: italic; }

        .content-body { padding: 1.25rem 1.5rem; position: relative; z-index: 1; }

        .form-container { background: var(--bg-form); border: 1px solid var(--border-light); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.35rem; box-shadow: 0 3px 12px var(--shadow-warm); backdrop-filter: blur(10px); overflow: hidden; }
        .form-title { font-family: 'Spectral', serif; font-size: 1rem; font-weight: 600; color: var(--fg-primary); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border-light); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.7rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.22rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-label { font-size: 0.65rem; font-weight: 500; color: var(--fg-secondary); text-transform: uppercase; letter-spacing: 0.07em; }
        .form-input, .form-textarea, .form-select { padding: 0.48rem 0.68rem; border: 1px solid var(--border-medium); border-radius: 5px; background: var(--input-bg); font-family: inherit; font-size: 0.85rem; color: var(--fg-primary); transition: all 0.22s ease; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.08); }
        .form-textarea { min-height: 60px; resize: vertical; line-height: 1.42; }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.28rem; padding: 0.52rem 1rem; border: none; border-radius: 5px; font-family: 'Spectral', serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.22s ease; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-copper) 100%); color: #fff; box-shadow: 0 2px 8px rgba(201, 162, 39, 0.28); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(201, 162, 39, 0.35); }
        .btn-secondary { background: transparent; color: var(--fg-secondary); border: 1px solid var(--border-medium); }
        .btn-danger { background: transparent; color: #a04040; border: 1px solid rgba(160, 64, 64, 0.25); }

        .secret-section { background: rgba(139, 105, 20, 0.05); border: 1px dashed rgba(201, 162, 39, 0.22); border-radius: 5px; padding: 0.7rem; margin-top: 0.45rem; }
        .secret-section .form-label { color: var(--accent-sepia); }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.85rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px var(--shadow-warm); transition: all 0.28s ease; position: relative; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent-gold), var(--accent-copper)); opacity: 0; transition: opacity 0.28s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 5px 16px var(--shadow-warm); }
        .card:hover::before { opacity: 1; }
        .card-header { padding: 0.7rem 0.95rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: flex-start; }
        .card-name { font-family: 'Spectral', serif; font-size: 1.05rem; font-weight: 600; color: var(--fg-primary); }
        .card-tag { display: inline-block; padding: 0.1rem 0.4rem; background: var(--cat-magic-bg); color: var(--cat-magic); border-radius: 16px; font-size: 0.65rem; font-weight: 500; margin-top: 0.12rem; }
        .card-body { padding: 0.7rem 0.95rem; }
        .card-section { margin-bottom: 0.55rem; }
        .card-section:last-child { margin-bottom: 0; }
        .card-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-muted); margin-bottom: 0.12rem; }
        .card-text { color: var(--fg-secondary); line-height: 1.48; font-size: 0.88rem; white-space: pre-line; }

        .secret-block { position: relative; margin-top: 0.45rem; padding: 0.55rem 0.7rem; background: rgba(201, 162, 39, 0.04); border-radius: 5px; border-left: 3px solid var(--accent-gold); }
        .secret-block.is-blurred { filter: blur(6px); user-select: none; cursor: pointer; }
        .secret-block.is-blurred::after { content: 'SECRET'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-gold); color: #fff; padding: 0.18rem 0.45rem; border-radius: 3px; font-size: 0.62rem; font-weight: 600; }

        .empty-state { text-align: center; padding: 2rem 1.3rem; color: var(--fg-muted); }
        .empty-icon { width: 42px; height: 42px; margin: 0 auto 0.8rem; opacity: 0.35; }

        .toast { position: fixed; bottom: 1rem; right: 1rem; padding: 0.65rem 0.9rem; background: var(--sidebar-bg); color: var(--sidebar-fg); border-radius: 5px; border-left: 3px solid var(--accent-gold); box-shadow: 0 3px 12px rgba(0, 0, 0, 0.28); transform: translateX(150%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; font-size: 0.85rem; }
        .toast.show { transform: translateX(0); }

        .mobile-menu-btn { display: none; position: fixed; top: 0.5rem; left: 0.5rem; z-index: 200; width: 32px; height: 32px; background: var(--sidebar-bg); border: 1px solid rgba(201, 162, 39, 0.28); border-radius: 5px; color: var(--accent-gold); cursor: pointer; align-items: center; justify-content: center; }
        .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55); z-index: 50; opacity: 0; pointer-events: none; }
        .mobile-overlay.active { opacity: 1; pointer-events: auto; }
        
        .hidden-input { position: absolute; width: 1px; height: 1px; opacity: 0; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: flex; }
            .mobile-overlay { display: block; }
            .top-bar { padding-top: 3rem; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--fg-muted); border-radius: 2px; }
    </style>
</head>
<body data-theme="light" data-page="magie">
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <input type="file" id="importInput" class="hidden-input" accept=".json">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Scriptorium</div>
            <div class="logo-subtitle">L'atelier de l'ecrivain</div>
        </div>

        <div class="sidebar-actions">
            <button class="sidebar-btn" id="exportBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export
            </button>
            <button class="sidebar-btn" id="importBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Import
            </button>
            <button class="sidebar-btn full-width" id="undoBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 2.83-6.36L3 7"/></svg>
                Annuler
            </button>
        </div>

        <nav class="nav-section" id="navSection"></nav>

        <div class="sidebar-stats">
            <div class="stat-item"><span>Types de Magie</span><span class="stat-value" id="magicCount">0</span></div>
            <div class="stat-item highlight"><span>Total mots</span><span class="stat-value" id="wordCount">0</span></div>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="top-bar">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Rechercher une magie..." aria-label="Rechercher">
            </div>
            <div class="top-actions">
                <button class="icon-btn" id="secretsToggleBtn" title="Masquer/Afficher les secrets">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </button>
                <button class="icon-btn" id="focusModeBtn" title="Mode Focus">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button class="icon-btn" id="themeToggleBtn" title="Theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>

        <section class="section active" id="magicSection">
            <header class="content-header">
                <h1 class="page-title">Types de Magie</h1>
                <p class="page-subtitle">Définissez les systèmes magiques de votre monde</p>
            </header>
            <div class="content-body">
                <div class="form-container" id="magicFormContainer">
                    <h2 class="form-title" id="magicFormTitle">Nouveau type de magie</h2>
                    <form id="magicForm" class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Nom</label>
                            <input type="text" id="magicName" class="form-input" placeholder="Ex: Pyromancie" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Source / Origine</label>
                            <input type="text" id="magicSource" class="form-input" placeholder="Ex: mana, sang, divinité">
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">Description</label>
                            <textarea id="magicDescription" class="form-textarea" placeholder="Principes de base, apparence visuelle..."></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label class="form-label">Limitations & Coûts</label>
                            <textarea id="magicLimits" class="form-textarea" placeholder="Effets secondaires, tabous..."></textarea>
                        </div>
                        <div class="form-group full-width">
                            <div class="secret-section">
                                <label class="form-label">Secrets (optionnel)</label>
                                <textarea id="magicSecret" class="form-textarea" placeholder="Origines cachées..." style="min-height:48px;"></textarea>
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <button type="submit" class="btn btn-primary">Enregistrer</button>
                            <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">Annuler</button>
                        </div>
                    </form>
                </div>
                <div class="cards-grid" id="magicGrid"></div>
                <div class="empty-state" id="magicEmpty">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <h3 class="empty-title">Aucun type de magie</h3>
                    <p class="empty-text">Créez vos systèmes magiques.</p>
                </div>
            </div>
        </section>
    </main>

    <div class="toast" id="toast"><span id="toastMessage"></span></div>

<script>
(function () {
  const STORAGE_KEY = 'scriptorium_v4';
  const HISTORY_KEY = 'scriptorium_history_v4';
  const pageId = 'magie';
  const $ = (id) => document.getElementById(id);

  let state = {
    characters: [],
    places: [],
    objects: [],
    encyclopedia: [],
    glossary: [],
    magicTypes: [],
    chapters: [{ id: 'ch1', title: 'Chapitre 1', notes: [] }]
  };
  let history = [];
  let edit = { magicId: null };
  let hideSecrets = true;
  let focusMode = false;

  // UTILITAIRES
  function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
  function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function countWords(t) { return (t || '').trim().split(/\s+/).filter(Boolean).length; }
  function showToast(msg) {
    const toast = $('toast'); if(!toast) return;
    $('toastMessage').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // DATA
  function load() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
          state = { ...state, ...JSON.parse(saved) };
          if (!state.magicTypes) state.magicTypes = [];
      }
      history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    } catch (e) { console.error(e); }

    const theme = localStorage.getItem('scriptorium_theme');
    if (theme) {
      document.body.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    }
  }

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  
  function recordHistory() {
    history.push(JSON.stringify(state));
    if (history.length > 30) history.shift();
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  }

  function undo() {
    if (!history.length) return showToast('Rien à annuler');
    state = JSON.parse(history.pop());
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    save();
    resetEdit();
    renderAll();
    showToast('Action annulée');
  }

  // NAVIGATION
  const FALLBACK_PAGES = [
    { id: 'personnages', label: 'Personnages', file: 'personnages.html', section: 'Monde' },
    { id: 'lieux', label: 'Lieux', file: 'lieux.html', section: 'Monde' },
    { id: 'objets', label: 'Objets', file: 'objets.html', section: 'Monde' },
    { id: 'encyclopedie', label: 'Encyclopédie', file: 'encyclopedie.html', section: 'Monde' },
    { id: 'glossaire', label: 'Glossaire', file: 'glossaire.html', section: 'Monde' },
    { id: 'magie', label: 'Magie', file: 'magie.html', section: 'Monde' },
    { id: 'chronologie', label: 'Chronologie', file: 'chronologie.html', section: 'Histoire' }
  ];

  async function buildNavigation() {
    const nav = $('navSection'); if (!nav) return;
    // Logique simplifiée sans fetch externe pour garantir que ça marche
    nav.innerHTML = '';
    const groups = {};
    FALLBACK_PAGES.forEach(p => { if (!groups[p.section]) groups[p.section] = []; groups[p.section].push(p); });
    
    Object.keys(groups).forEach(section => {
      const label = document.createElement('div');
      label.className = 'nav-label';
      label.textContent = section;
      nav.appendChild(label);
      
      groups[section].forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'nav-item' + (p.id === pageId ? ' active' : '');
        btn.textContent = p.label;
        btn.onclick = () => window.location.href = p.file;
        nav.appendChild(btn);
      });
    });
  }

  // UI
  function updateThemeIcon(theme) {
    const icon = $('themeIcon');
    if (!icon) return;
    icon.innerHTML = theme === 'dark'
      ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
      : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  }

  function toggleTheme() {
    const curr = document.body.getAttribute('data-theme') || 'light';
    const next = curr === 'light' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('scriptorium_theme', next);
    updateThemeIcon(next);
  }

  function updateStats() {
    if ($('magicCount')) $('magicCount').textContent = state.magicTypes.length;
    let words = 0;
    state.magicTypes.forEach(m => words += countWords(m.name) + countWords(m.description) + countWords(m.limits) + countWords(m.secret));
    if ($('wordCount')) $('wordCount').textContent = words;
  }

  function createSecretBlock(secret) {
    if (!secret || !secret.trim()) return null;
    const block = document.createElement('div');
    block.className = 'secret-block' + (hideSecrets ? ' is-blurred' : '');
    block.innerHTML = '<p class="card-text">' + escapeHtml(secret) + '</p>';
    if (hideSecrets) block.addEventListener('click', () => block.classList.remove('is-blurred'));
    return block;
  }

  // RENDER
  function renderAll() {
    renderMagicTypes();
    updateStats();
  }

  function renderMagicTypes() {
    const grid = $('magicGrid');
    const empty = $('magicEmpty');
    if (!grid) return;

    const q = ($('searchInput').value || '').toLowerCase();
    const filtered = state.magicTypes.filter(m => 
      (m.name || '').toLowerCase().includes(q) || 
      (m.source || '').toLowerCase().includes(q) || 
      (m.description || '').toLowerCase().includes(q)
    );

    grid.innerHTML = '';
    if (empty) empty.style.display = filtered.length ? 'none' : 'block';

    filtered.forEach(m => {
      const card = document.createElement('div');
      card.className = 'card';
      
      let html = `
        <div class="card-header">
          <div>
            <h3 class="card-name">${escapeHtml(m.name || 'Sans nom')}</h3>
            ${m.source ? '<span class="card-tag">' + escapeHtml(m.source) + '</span>' : ''}
          </div>
          <div class="card-actions" style="display:flex; gap:0.2rem;">
            <button class="btn btn-icon btn-secondary" onclick="editMagic('${m.id}')" style="padding:0.2rem 0.4rem; font-size:0.8rem;">✎</button>
            <button class="btn btn-icon btn-danger" onclick="deleteMagic('${m.id}')" style="padding:0.2rem 0.4rem; font-size:0.8rem;">×</button>
          </div>
        </div>
        <div class="card-body">
      `;

      if (m.description) html += `<div class="card-section"><div class="card-label">Description</div><p class="card-text">${escapeHtml(m.description)}</p></div>`;
      if (m.limits) html += `<div class="card-section"><div class="card-label">Limites</div><p class="card-text">${escapeHtml(m.limits)}</p></div>`;
      
      card.innerHTML = html;
      
      if (m.secret && m.secret.trim()) {
        const sb = createSecretBlock(m.secret);
        if (sb) card.querySelector('.card-body').appendChild(sb);
      }

      grid.appendChild(card);
    });
  }

  // FORM LOGIC
  function bindForm() {
    const form = $('magicForm');
    if (!form) return;

    form.addEventListener('submit', e => {
      e.preventDefault();
      recordHistory();
      const data = {
        id: edit.magicId || generateId(),
        name: $('magicName').value.trim(),
        source: $('magicSource').value.trim(),
        description: $('magicDescription').value.trim(),
        limits: $('magicLimits').value.trim(),
        secret: $('magicSecret').value.trim()
      };

      if (edit.magicId) {
        const idx = state.magicTypes.findIndex(m => m.id === edit.magicId);
        if (idx !== -1) state.magicTypes[idx] = data;
      } else {
        state.magicTypes.push(data);
      }

      save();
      form.reset();
      resetEdit();
      renderAll();
      showToast('Magie sauvegardée');
    });

    $('cancelEditBtn').addEventListener('click', () => {
      form.reset();
      resetEdit();
    });
  }

  function resetEdit() {
    edit.magicId = null;
    $('magicFormTitle').textContent = 'Nouveau type de magie';
    $('cancelEditBtn').style.display = 'none';
  }

  window.editMagic = (id) => {
    const m = state.magicTypes.find(x => x.id === id);
    if (!m) return;
    edit.magicId = id;
    $('magicName').value = m.name || '';
    $('magicSource').value = m.source || '';
    $('magicDescription').value = m.description || '';
    $('magicLimits').value = m.limits || '';
    $('magicSecret').value = m.secret || '';
    $('magicFormTitle').textContent = 'Modifier la magie';
    $('cancelEditBtn').style.display = 'inline-flex';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteMagic = (id) => {
    if (!confirm('Supprimer ce type de magie ?')) return;
    recordHistory();
    state.magicTypes = state.magicTypes.filter(m => m.id !== id);
    // Nettoyage chez les personnages
    state.characters.forEach(c => { if (c.magicTypeId === id) c.magicTypeId = null; });
    
    save();
    renderAll();
    showToast('Magie supprimée');
  };

  // COMMON EVENTS
  $('themeToggleBtn').addEventListener('click', toggleTheme);
  $('searchInput').addEventListener('input', renderMagicTypes);
  
  $('secretsToggleBtn').addEventListener('click', () => { 
      hideSecrets = !hideSecrets; 
      $('secretsToggleBtn').classList.toggle('active', hideSecrets); 
      renderMagicTypes(); 
  });
  
  $('focusModeBtn').addEventListener('click', () => {
      focusMode = !focusMode;
      if ($('sidebar')) $('sidebar').classList.toggle('hidden', focusMode);
      if ($('mainContent')) $('mainContent').classList.toggle('expanded', focusMode);
      $('focusModeBtn').classList.toggle('active', focusMode);
      document.querySelectorAll('.form-container').forEach(el => el.classList.toggle('hidden', focusMode));
  });

  // Mobile
  if ($('mobileMenuBtn') && $('sidebar')) $('mobileMenuBtn').addEventListener('click', () => $('sidebar').classList.add('open'));
  if ($('mobileOverlay') && $('sidebar')) $('mobileOverlay').addEventListener('click', () => { $('sidebar').classList.remove('open'); $('mobileOverlay').classList.remove('active'); });

  // Import/Export
  if ($('exportBtn')) $('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scriptorium_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
      showToast('Grimoire exporté');
  });
  if ($('importBtn') && $('importInput')) $('importBtn').addEventListener('click', () => $('importInput').click());
  if ($('importInput')) $('importInput').addEventListener('change', e => {
      if (!e.target.files[0]) return;
      const fr = new FileReader();
      fr.onload = ev => {
        try { 
            const imported = JSON.parse(ev.target.result);
            state = { ...state, ...imported };
            if(!state.magicTypes) state.magicTypes = [];
            save(); renderAll(); showToast('Import réussi'); 
        }
        catch (_) { showToast('Erreur d\'import'); }
      };
      fr.readAsText(e.target.files[0]);
  });

  // Undo
  if ($('undoBtn')) $('undoBtn').addEventListener('click', undo);

  // INIT
  load();
  buildNavigation();
  bindForm();
  renderAll();
})();
</script>
</body>
</html>
