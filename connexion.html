<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptorium - Connexion P2P</title>
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/wofime/Scriptorium/main/logo%20Scriptorium.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,500;0,700;1,300;1,500&display=swap" rel="stylesheet">
    
    <!-- BIBLIOTHEQUE P2P -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #f4ede4; --bg-secondary: #e8dfd3; --bg-card: rgba(244, 237, 228, 0.9);
            --fg-primary: #2c2418; --fg-secondary: #5c4f3d; --fg-muted: #8b7d68;
            --accent-gold: #c9a227; --accent-copper: #b87333;
            --border-light: rgba(44, 36, 24, 0.12); --border-medium: rgba(44, 36, 24, 0.25);
            --shadow-warm: rgba(139, 105, 20, 0.12); --sidebar-bg: #231d15; --sidebar-fg: #e8dfd3;
            --input-bg: rgba(255, 255, 255, 0.75);
            --success: #2d5a4a; --success-bg: rgba(45, 90, 74, 0.15);
            --error: #8b3a3a; --error-bg: rgba(139, 58, 58, 0.15);
        }
        [data-theme="dark"] {
            --bg-primary: #1a1714; --bg-secondary: #252019; --bg-card: rgba(35, 30, 24, 0.92);
            --fg-primary: #e8dfd3; --fg-secondary: #c4b8a4; --fg-muted: #8a7d6a;
            --accent-gold: #d4a84b; --border-light: rgba(232, 223, 211, 0.1);
            --shadow-warm: rgba(0, 0, 0, 0.35); --sidebar-bg: #0f0d0a; --input-bg: rgba(55, 50, 43, 0.65);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Crimson Pro', Georgia, serif; background: var(--bg-primary); color: var(--fg-primary); min-height: 100vh; }
        body::before { content: ''; position: fixed; inset: 0; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.022; pointer-events: none; z-index: 0; }
        
        /* SIDEBAR */
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0a0806 100%); border-right: 1px solid rgba(201, 162, 39, 0.18); z-index: 100; display: flex; flex-direction: column; transition: transform 0.4s; overflow-y: auto; }
        .sidebar-header { padding: 1.3rem 1.15rem; border-bottom: 1px solid rgba(201, 162, 39, 0.12); }
        .logo { font-family: 'Spectral', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent-gold); letter-spacing: 0.08em; text-transform: uppercase; }
        .logo-subtitle { font-size: 0.7rem; color: var(--fg-muted); font-style: italic; margin-top: 0.12rem; }
        
        .sidebar-actions { padding: 0.65rem 0.95rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; border-bottom: 1px solid rgba(201, 162, 39, 0.08); }
        .sidebar-btn { display: flex; align-items: center; justify-content: center; gap: 0.22rem; padding: 0.42rem 0.45rem; background: rgba(201, 162, 39, 0.06); border: 1px solid rgba(201, 162, 39, 0.18); border-radius: 5px; color: var(--sidebar-fg); font-family: inherit; font-size: 0.7rem; cursor: pointer; transition: all 0.22s ease; }
        .sidebar-btn:hover { background: rgba(201, 162, 39, 0.12); color: var(--accent-gold); }
        .sidebar-btn svg { width: 11px; height: 11px; } .sidebar-btn.full-width { grid-column: 1 / -1; }
        
        .nav-section { padding: 0.55rem 0; flex: 1; }
        .nav-label { padding: 0.32rem 1.15rem; font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--fg-muted); margin-top: 0.35rem; }
        .nav-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.15rem; color: var(--sidebar-fg); cursor: pointer; transition: all 0.22s ease; position: relative; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; font-size: 0.85rem; }
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent-gold); transform: scaleY(0); transition: transform 0.22s ease; }
        .nav-item:hover { background: rgba(201, 162, 39, 0.06); color: var(--accent-gold); }
        .nav-item.active { background: rgba(201, 162, 39, 0.1); color: var(--accent-gold); }
        .nav-item.active::before { transform: scaleY(1); }
        .nav-icon { width: 14px; height: 14px; opacity: 0.62; }

        .main-content { margin-left: 250px; min-height: 100vh; background: var(--bg-primary); position: relative; transition: margin-left 0.4s ease; }
        .top-bar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.35rem; background: var(--bg-secondary); border-bottom: 1px solid var(--border-light); }
        .top-actions { display: flex; gap: 0.3rem; margin-left: auto; }
        .icon-btn { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: var(--input-bg); border: 1px solid var(--border-medium); border-radius: 5px; color: var(--fg-secondary); cursor: pointer; }
        .icon-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
        .content-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-light); background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); }
        .page-title { font-family: 'Spectral', serif; font-size: 1.55rem; font-weight: 700; color: var(--fg-primary); }
        .page-subtitle { color: var(--fg-secondary); font-size: 0.88rem; margin-top: 0.2rem; font-style: italic; }
        .content-body { padding: 1.25rem 1.5rem; position: relative; z-index: 1; }
        
        /* CONNECTION GRID */
        .connection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .connection-grid { grid-template-columns: 1fr; } }
        
        .connect-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 8px; padding: 1.5rem; box-shadow: 0 3px 12px var(--shadow-warm); }
        .connect-card h3 { font-family: 'Spectral', serif; font-size: 1.1rem; color: var(--accent-gold); margin-bottom: 1rem; border-bottom: 1px solid var(--border-light); padding-bottom: 0.5rem; }
        
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.8rem; color: var(--fg-muted); margin-bottom: 0.3rem; text-transform: uppercase; }
        .form-input { width: 100%; padding: 0.6rem; background: var(--input-bg); border: 1px solid var(--border-medium); border-radius: 5px; color: var(--fg-primary); font-family: inherit; font-size: 1rem; }
        .form-input:focus { outline: none; border-color: var(--accent-gold); }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem; padding: 0.6rem 1.2rem; border: none; border-radius: 5px; font-family: 'Spectral', serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.22s; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-gold), var(--accent-copper)); color: #fff; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: var(--success); color: white; }

        .status-box { margin-top: 1rem; padding: 0.8rem; border-radius: 5px; font-size: 0.85rem; display: none; }
        .status-box.active { display: block; }
        .status-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
        .status-error { background: var(--error-bg); color: var(--error); border: 1px solid var(--error); }
        .status-info { background: rgba(201, 162, 39, 0.1); color: var(--accent-gold); border: 1px solid var(--accent-gold); }

        .code-display { 
            font-family: 'Spectral', serif; font-size: 2.5rem; font-weight: 700; 
            background: var(--bg-primary); padding: 1rem; border-radius: 8px; 
            text-align: center; border: 1px solid var(--accent-gold); 
            margin: 1rem 0; letter-spacing: 0.5em; 
            user-select: all;
        }

        .mobile-menu-btn { display: none; position: fixed; top: 0.5rem; left: 0.5rem; z-index: 200; width: 32px; height: 32px; background: var(--sidebar-bg); border-radius: 5px; color: var(--accent-gold); cursor: pointer; align-items: center; justify-content: center; border: none; }
        .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: flex; }
            .mobile-overlay.active { display: block; }
            .top-bar { padding-top: 3rem; }
        }
    </style>
</head>
<body data-theme="light" data-page="connexion">
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <input type="file" id="importInput" style="display:none" accept=".json">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Scriptorium</div>
            <div class="logo-subtitle">L'atelier de l'ecrivain</div>
        </div>
        
        <div class="sidebar-actions">
            <button class="sidebar-btn" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
            <button class="sidebar-btn" id="importBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import</button>
            <button class="sidebar-btn full-width" id="undoBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 2.83-6.36L3 7"/></svg>Annuler</button>
        </div>

        <nav class="nav-section" id="navSection"></nav>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="top-bar">
            <div style="flex:1"></div>
            <div class="top-actions">
                <button class="icon-btn" id="themeToggleBtn" title="Theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
            </div>
        </div>

        <section class="section active">
            <header class="content-header">
                <h1 class="page-title">Connexion P2P</h1>
                <p class="page-subtitle">Partagez votre monde avec un autre appareil en direct</p>
            </header>
            <div class="content-body">
                <div class="connection-grid">
                    <!-- HOST SIDE -->
                    <div class="connect-card">
                        <h3>Partager mon monde</h3>
                        <p style="font-size:0.9rem; color:var(--fg-secondary); margin-bottom:1rem;">Generer un code simple a communiquer.</p>
                        <button class="btn btn-primary" id="createBtn">Generer un Code</button>
                        <div id="hostStatus" class="status-box"></div>
                        <div id="codeArea" style="display:none; margin-top:1rem;">
                            <label class="form-label">Votre code partenaire</label>
                            <div class="code-display" id="myCode">00000</div>
                            <div style="font-size:0.8rem; color:var(--fg-muted); text-align:center;">Communiquez ces 5 chiffres a votre partenaire.</div>
                        </div>
                    </div>

                    <!-- CLIENT SIDE -->
                    <div class="connect-card">
                        <h3>Rejoindre un monde</h3>
                        <p style="font-size:0.9rem; color:var(--fg-secondary); margin-bottom:1rem;">Entrez le code a 5 chiffres recu.</p>
                        <div class="form-group">
                            <label class="form-label">Code partenaire</label>
                            <input type="text" id="peerIdInput" class="form-input" placeholder="Ex: 48291" maxlength="5" inputmode="numeric" pattern="[0-9]*">
                        </div>
                        <button class="btn btn-primary" id="joinBtn">Se connecter</button>
                        <div id="clientStatus" class="status-box"></div>
                        <div id="receivedDataArea" style="display:none; margin-top:1rem;">
                            <div style="padding:1rem; background:var(--success-bg); border-radius:5px; color:var(--success); text-align:center;">
                                <strong>Monde reçu !</strong>
                                <button class="btn btn-success" style="margin-top:1rem;" onclick="loadReceivedData()">Explorer ce monde</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // ===== 1. CONFIGURATION MENU (INTEGREE) =====
        // J'intègre les données ici pour que le menu s'affiche même sans fichier externe
        const SCRIPTORIUM_PAGES = [
            { id: 'personnages', label: 'Personnages', file: 'personnages.html', section: 'Monde' },
            { id: 'lieux', label: 'Lieux', file: 'lieux.html', section: 'Monde' },
            { id: 'objets', label: 'Objets', file: 'objets.html', section: 'Monde' },
            { id: 'encyclopedie', label: 'Encyclopédie', file: 'encyclopedie.html', section: 'Monde' },
            { id: 'glossaire', label: 'Glossaire', file: 'glossaire.html', section: 'Monde' },
            { id: 'magie', label: 'Magie', file: 'magie.html', section: 'Monde' },
            { id: 'connexion', label: 'Connexion', file: 'connexion.html', section: 'Partage' },
            { id: 'chronologie', label: 'Chronologie', file: 'chronologie.html', section: 'Histoire' }
        ];
        const iconMap = {
            'personnages': '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>',
            'lieux': '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
            'objets': '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
            'encyclopedie': '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
            'glossaire': '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',
            'magie': '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>',
            'connexion': '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
            'chronologie': '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'
        };

        const $ = id => document.getElementById(id);
        const pageId = 'connexion';
        let pageMap = {};
        let history = [];
        let state = { characters: [], places: [], objects: [], encyclopedia: [], glossary: [], magicTypes: [], chapters: [{ id: 'ch1', title: 'Chapitre 1', notes: [] }] };

        function buildNavigation() {
            const nav = $('navSection'); if(!nav) return;
            const pages = SCRIPTORIUM_PAGES; // Utilisation de la variable locale
            pageMap = Object.fromEntries(pages.map(p => [p.id, p]));
            const groups = {};
            pages.forEach(p => { if (!groups[p.section]) groups[p.section] = []; groups[p.section].push(p); });
            let html = '';
            for (const sec in groups) {
                html += `<div class="nav-label">${sec}</div>`;
                groups[sec].forEach(p => {
                    const isActive = (p.id === pageId) ? ' active' : '';
                    html += `<button class="nav-item${isActive}" onclick="window.location.href='${p.file}'"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconMap[p.id] || ''}</svg>${p.label}</button>`;
                });
            }
            nav.innerHTML = html;
        }
        
        function updateThemeIcon(theme) { const icon = $('themeIcon'); icon.innerHTML = theme === 'dark' ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>' : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'; }
        function toggleTheme() { const curr = document.body.getAttribute('data-theme') || 'light'; const next = curr === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('scriptorium_theme', next); updateThemeIcon(next); }
        
        // ===== 2. P2P LOGIC (Robuste) =====
        let peer = null;
        let conn = null;
        let receivedState = null;

        function getStorageKey() { return 'scriptorium_v4'; }

        function showStatus(elId, msg, type) {
            const el = $(elId);
            el.textContent = msg;
            el.className = 'status-box active status-' + type;
        }

        // HOST LOGIC
        function initHostPeer() {
            if (typeof Peer === 'undefined') {
                showStatus('hostStatus', "Erreur: Librairie P2P non chargee. Verifiez votre connexion internet.", 'error');
                return;
            }
            if (peer && !peer.destroyed) peer.destroy();
            
            showStatus('hostStatus', "Generation...", 'info');
            $('createBtn').disabled = true;

            const shortId = Math.floor(10000 + Math.random() * 90000).toString();
            
            try {
                peer = new Peer(shortId);

                peer.on('open', (id) => {
                    $('myCode').textContent = id;
                    $('codeArea').style.display = 'block';
                    $('createBtn').textContent = "En attente...";
                    showStatus('hostStatus', "Pret. Envoyez le code.", 'success');
                });

                peer.on('connection', (connection) => {
                    conn = connection;
                    conn.on('open', () => {
                        showStatus('hostStatus', "Connecte ! Envoi...", 'success');
                        const data = localStorage.getItem(getStorageKey());
                        conn.send(data);
                        showStatus('hostStatus', "Monde envoye !", 'success');
                    });
                    conn.on('close', () => showStatus('hostStatus', "Deconnecte.", 'info'));
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        showStatus('hostStatus', "Code occupe, nouvel essai...", 'info');
                        setTimeout(initHostPeer, 100);
                    } else {
                        showStatus('hostStatus', "Erreur: " + err.type, 'error');
                        $('createBtn').disabled = false;
                        $('createBtn').textContent = "Reessayer";
                    }
                });
            } catch(e) {
                showStatus('hostStatus', "Erreur critique: " + e.message, 'error');
            }
        }

        // CLIENT LOGIC
        function joinPeer() {
            if (typeof Peer === 'undefined') {
                showStatus('clientStatus', "Erreur: Librairie P2P non chargee.", 'error');
                return;
            }
            let remoteCode = $('peerIdInput').value.trim().replace(/\D/g,'');
            if (remoteCode.length !== 5) {
                showStatus('clientStatus', "5 chiffres requis.", 'error');
                return;
            }

            if (!peer || peer.destroyed) {
                peer = new Peer(); 
                peer.on('open', () => { connectToRemote(remoteCode); });
                peer.on('error', (err) => { showStatus('clientStatus', "Erreur: " + err.type, 'error'); });
            } else {
                connectToRemote(remoteCode);
            }
        }

        function connectToRemote(remoteId) {
            showStatus('clientStatus', "Connexion...", 'info');
            $('joinBtn').disabled = true;
            
            conn = peer.connect(remoteId, { reliable: true });
            
            conn.on('open', () => showStatus('clientStatus', "Connecte ! Reception...", 'info'));
            conn.on('data', (data) => {
                try {
                    receivedState = JSON.parse(data);
                    showStatus('clientStatus', "Recu !", 'success');
                    $('receivedDataArea').style.display = 'block';
                    $('joinBtn').disabled = true;
                } catch(e) { showStatus('clientStatus', "Erreur format.", 'error'); }
            });
            conn.on('close', () => showStatus('clientStatus', "Ferme.", 'info'));
            conn.on('error', () => showStatus('clientStatus', "Erreur lien.", 'error'));
        }

        function loadReceivedData() {
            if(receivedState) {
                localStorage.setItem(getStorageKey(), JSON.stringify(receivedState));
                window.location.href = 'personnages.html';
            }
        }

        // ===== HELPERS =====
        function loadState() { const saved = localStorage.getItem(getStorageKey()); if (saved) { try { state = { ...state, ...JSON.parse(saved) }; } catch(e) {} } }
        function recordHistory() { history.push(JSON.stringify(state)); if (history.length > 30) history.shift(); localStorage.setItem('scriptorium_history_v4', JSON.stringify(history)); }
        function undo() { if (history.length === 0) { alert("Rien à annuler"); return; } state = JSON.parse(history.pop()); localStorage.setItem(getStorageKey(), JSON.stringify(state)); localStorage.setItem('scriptorium_history_v4', JSON.stringify(history)); alert("Action annulée"); location.reload(); }

        // Event Listeners
        $('createBtn').addEventListener('click', initHostPeer);
        $('joinBtn').addEventListener('click', joinPeer);
        $('themeToggleBtn').addEventListener('click', toggleTheme);
        $('mobileMenuBtn').addEventListener('click', () => $('sidebar').classList.add('open'));
        $('mobileOverlay').addEventListener('click', () => $('sidebar').classList.remove('open'));
        
        $('exportBtn').addEventListener('click', () => {
            const blob = new Blob([localStorage.getItem(getStorageKey())], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'scriptorium_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
        });
        $('importBtn').addEventListener('click', () => $('importInput').click());
        $('importInput').addEventListener('change', e => {
            if(!e.target.files[0]) return;
            const fr = new FileReader();
            fr.onload = ev => { try { localStorage.setItem(getStorageKey(), ev.target.result); alert('Import réussi !'); location.reload(); } catch(e) { alert('Erreur fichier'); } };
            fr.readAsText(e.target.files[0]);
        });
        $('undoBtn').addEventListener('click', undo);

        // INIT
        loadState();
        buildNavigation(); // Appel immédiat de la construction du menu
        const theme = localStorage.getItem('scriptorium_theme');
        if (theme) { document.body.setAttribute('data-theme', theme); updateThemeIcon(theme); }
        
        const hist = localStorage.getItem('scriptorium_history_v4');
        if(hist) history = JSON.parse(hist);
    </script>
</body>
</html>
