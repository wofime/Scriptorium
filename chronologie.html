<!DOCTYPE html>

    <script src="scriptorium_config.js"></script>
    <style>

        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0a0806 100%); border-right: 1px solid rgba(201, 162, 39, 0.18); z-index: 100; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; } .sidebar.hidden { transform: translateX(-100%); }
        .sidebar-header { padding: 1.3rem 1.15rem; border-bottom: 1px solid rgba(201, 162, 39, 0.12); } .logo { font-family: 'Spectral', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent-gold); letter-spacing: 0.08em; text-transform: uppercase; } .logo-subtitle { font-size: 0.7rem; color: var(--fg-muted); font-style: italic; margin-top: 0.12rem; }
        .sidebar-actions { padding: 0.65rem 0.95rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; border-bottom: 1px solid rgba(201, 162, 39, 0.08); } .sidebar-btn { display: flex; align-items: center; justify-content: center; gap: 0.22rem; padding: 0.42rem 0.45rem; background: rgba(201, 162, 39, 0.06); border: 1px solid rgba(201, 162, 39, 0.18); border-radius: 5px; color: var(--sidebar-fg); font-family: inherit; font-size: 0.7rem; cursor: pointer; transition: all 0.22s ease; } .sidebar-btn:hover { background: rgba(201, 162, 39, 0.12); color: var(--accent-gold); } .sidebar-btn svg { width: 11px; height: 11px; } .sidebar-btn.full-width { grid-column: 1 / -1; }

        .nav-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.15rem; color: var(--sidebar-fg); cursor: pointer; transition: all 0.22s ease; position: relative; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; font-size: 0.85rem; }

        .chapter-count { font-size: 0.7rem; opacity: 0.7; }

        .note-date { font-size: 0.7rem; color: var(--fg-muted); font-style: italic; }

        .secret-block.has-secret { transition: filter 0.28s ease; }
        .secret-block.is-blurred { filter: blur(6px); user-select: none; cursor: pointer; }
        .secret-block.is-blurred::after { content: 'SECRET'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-gold); color: #fff; padding: 0.18rem 0.45rem; border-radius: 3px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.04em; pointer-events: none; }
        .secret-block.revealed { filter: blur(0); cursor: default; }
        .secret-block.revealed::after { display: none; }

        .form-container { background: var(--bg-form); border: 1px solid var(--border-light); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.35rem; box-shadow: 0 3px 12px var(--shadow-warm); backdrop-filter: blur(10px); transition: opacity 0.28s ease, transform 0.28s ease; overflow: hidden; } .form-container.hidden { opacity: 0; transform: translateY(-8px); height: 0; padding: 0; margin: 0; border-width: 0; }
        .form-title { font-family: 'Spectral', serif; font-size: 1rem; font-weight: 600; color: var(--fg-primary); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border-light); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.7rem; } .form-group { display: flex; flex-direction: column; gap: 0.22rem; } .form-group.full-width { grid-column: 1 / -1; }
        .form-label { font-size: 0.65rem; font-weight: 500; color: var(--fg-secondary); text-transform: uppercase; letter-spacing: 0.07em; }
        .form-input, .form-textarea, .form-select { padding: 0.48rem 0.68rem; border: 1px solid var(--border-medium); border-radius: 5px; background: var(--input-bg); font-family: inherit; font-size: 0.85rem; color: var(--fg-primary); transition: all 0.22s ease; } .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.08); }
        .form-textarea { min-height: 60px; resize: vertical; line-height: 1.42; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.28rem; padding: 0.52rem 1rem; border: none; border-radius: 5px; font-family: 'Spectral', serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.22s ease; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-copper) 100%); color: #fff; box-shadow: 0 2px 8px rgba(201, 162, 39, 0.28); } .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(201, 162, 39, 0.35); }
        .btn-secondary { background: transparent; color: var(--fg-secondary); border: 1px solid var(--border-medium); } .btn-secondary:hover { background: rgba(44, 36, 24, 0.04); } [data-theme="dark"] .btn-secondary:hover { background: rgba(232, 223, 211, 0.04); }
        .btn-success { background: var(--cat-lore); color: white; }
        
        .empty-state { text-align: center; padding: 2rem 1.3rem; color: var(--fg-muted); } .empty-icon { width: 42px; height: 42px; margin: 0 auto 0.8rem; opacity: 0.35; } .empty-title { font-family: 'Spectral', serif; font-size: 1.05rem; color: var(--fg-secondary); margin-bottom: 0.22rem; } .empty-text { font-size: 0.85rem; max-width: 230px; margin: 0 auto; }
        .toast { position: fixed; bottom: 1rem; right: 1rem; padding: 0.65rem 0.9rem; background: var(--sidebar-bg); color: var(--sidebar-fg); border-radius: 5px; border-left: 3px solid var(--accent-gold); box-shadow: 0 3px 12px rgba(0, 0, 0, 0.28); transform: translateX(150%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; display: flex; align-items: center; gap: 0.38rem; font-size: 0.85rem; } .toast.show { transform: translateX(0); } .toast-icon { width: 13px; height: 13px; color: var(--accent-gold); }
        .mobile-menu-btn { display: none; position: fixed; top: 0.5rem; left: 0.5rem; z-index: 200; width: 32px; height: 32px; background: var(--sidebar-bg); border: 1px solid rgba(201, 162, 39, 0.28); border-radius: 5px; color: var(--accent-gold); cursor: pointer; align-items: center; justify-content: center; }
        .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55); z-index: 50; opacity: 0; pointer-events: none; } .mobile-overlay.active { opacity: 1; pointer-events: auto; }
        .hidden-input { position: absolute; width: 1px; height: 1px; opacity: 0; }
        @media (max-width: 850px) { .chapters-layout { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; } .mobile-menu-btn { display: flex; }
            .mobile-overlay { display: block; }
            .top-bar { padding: 0.5rem 0.65rem; padding-top: 3rem; }
            .content-header { padding: 1rem 0.85rem; } .content-body { padding: 1rem 0.85rem; }
            .top-actions { position: fixed; top: 0.5rem; right: 0.5rem; z-index: 60; }
        }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg-secondary); } ::-webkit-scrollbar-thumb { background: var(--fg-muted); border-radius: 2px; }
    </style>
</head>
<body data-theme="light" data-page="chronologie">
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>

        <div class="sidebar-actions"><button class="sidebar-btn" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button><button class="sidebar-btn" id="importBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import</button><button class="sidebar-btn full-width" id="undoBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 2.83-6.36L3 7"/></svg>Annuler</button></div>

            <header class="content-header"><h1 class="page-title">Chronologie <span class="count-badge" id="chapterCountBadge">0</span></h1><p class="page-subtitle">Structurez votre recit</p></header>

    <div class="toast" id="toast"><svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="toastMessage"></span></div>
    <script>
        const STORAGE_KEY = 'scriptorium_v4'; const HISTORY_KEY = 'scriptorium_history_v4'; const $ = id => document.getElementById(id); const pageId = 'chronologie';
        let state = { characters: [], places: [], objects: [], encyclopedia: [], glossary: [], magicTypes: [], chapters: [{ id: 'ch1', title: 'Chapitre 1', notes: [] }] }; let history = []; let hideSecrets = true; let focusMode = false; let editingNoteId = null; let pageMap = {};
        const escapeHtml = t => { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }; const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } function showToast(msg) { const t = $('toast'); $('toastMessage').textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800); }
        function load() { const saved = localStorage.getItem(STORAGE_KEY); if (saved) { try { state = { ...state, ...JSON.parse(saved) }; if (!state.magicTypes) state.magicTypes = []; if (!state.chapters || state.chapters.length === 0) state.chapters = [{ id: 'ch1', title: 'Chapitre 1', notes: [] }]; } catch(e) { console.error(e); } } const theme = localStorage.getItem('scriptorium_theme'); if (theme) { document.body.setAttribute('data-theme', theme); updateThemeIcon(theme); } }
        function recordHistory() { history.push(JSON.stringify(state)); if (history.length > 30) history.shift(); localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }
        function undo() { if (history.length === 0) { showToast('Rien a annuler'); return; } state = JSON.parse(history.pop()); save(); localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); editingNoteId = null; $('noteForm').reset(); $('noteFormTitle').textContent = 'Ajouter un evenement'; renderAll(); showToast('Action annulee'); }
        function buildNavigation() { const nav = $('navSection'); if (!nav) return; const pages = (typeof SCRIPTORIUM_PAGES !== 'undefined') ? SCRIPTORIUM_PAGES : []; const icons = (typeof iconMap !== 'undefined') ? iconMap : {}; pageMap = Object.fromEntries(pages.map(p => [p.id, p])); const groups = {}; pages.forEach(p => { if (!groups[p.section]) groups[p.section] = []; groups[p.section].push(p); }); let html = ''; for (const sec in groups) { html += `<div class="nav-label">${escapeHtml(sec)}</div>`; groups[sec].forEach(p => { const isActive = (p.id === pageId) ? ' active' : ''; const iconSvg = icons[p.id] || ''; html += `<button class="nav-item${isActive}" onclick="navigateTo('${p.id}')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconSvg}</svg>${escapeHtml(p.label)}</button>`; }); } nav.innerHTML = html; }
        function navigateTo(id) { if (pageMap[id]) window.location.href = pageMap[id].file; } window.navigateTo = navigateTo;
        function updateThemeIcon(theme) { const icon = $('themeIcon'); icon.innerHTML = theme === 'dark' ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>' : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'; }
        function toggleTheme() { const curr = document.body.getAttribute('data-theme') || 'light'; const next = curr === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); localStorage.setItem('scriptorium_theme', next); updateThemeIcon(next); }
        function toggleFocus() { focusMode = !focusMode; $('sidebar').classList.toggle('hidden', focusMode); $('mainContent').classList.toggle('expanded', focusMode); $('focusModeBtn').classList.toggle('active', focusMode); $('noteFormContainer').classList.toggle('hidden', focusMode); }
        function toggleSecrets() { hideSecrets = !hideSecrets; $('secretsToggleBtn').classList.toggle('active', hideSecrets); renderNotes(); }
        function updateStats() { $('chapterCountBadge').textContent = state.chapters.length; }
        function createSecretBlock(secret) { if (!secret || !secret.trim()) return null; const block = document.createElement('div'); block.className = 'secret-block has-secret' + (hideSecrets ? ' is-blurred' : ''); block.innerHTML = '<p class="card-text">' + escapeHtml(secret) + '</p>'; if (hideSecrets) block.addEventListener('click', () => block.classList.add('revealed')); return block; }
        let currentChapterId = null;
        function renderChapters() { const list = $('chaptersList'); if (!list) return; list.innerHTML = '<div class="nav-label">Chapitres</div>'; if (!currentChapterId && state.chapters.length > 0) currentChapterId = state.chapters[0].id; state.chapters.forEach(ch => { const btn = document.createElement('button'); btn.className = 'chapter-item' + (ch.id === currentChapterId ? ' active' : ''); btn.innerHTML = '<span>' + escapeHtml(ch.title) + '</span><span class="chapter-count">' + ch.notes.length + '</span>'; btn.addEventListener('click', () => { currentChapterId = ch.id; renderAll(); }); list.appendChild(btn); }); const addBtn = document.createElement('button'); addBtn.className = 'btn btn-secondary add-chapter-btn'; addBtn.id = 'addChapterBtn'; addBtn.textContent = '+ Ajouter un chapitre'; addBtn.onclick = addChapter; list.appendChild(addBtn); renderNotes(); }
        function renderNotes() { const notesList = $('notesList'); const empty = $('notesEmpty'); const chapter = state.chapters.find(c => c.id === currentChapterId); const notes = chapter ? chapter.notes : []; notesList.innerHTML = ''; empty.style.display = notes.length ? 'none' : 'block'; notes.forEach(n => { const card = document.createElement('div'); card.className = 'card'; card.innerHTML = '<div class="card-header"><div><span class="note-category ' + n.category + '">' + escapeHtml(n.category) + '</span><div class="card-label">' + formatDate(n.date) + '</div></div><div class="card-actions"><button class="btn btn-icon btn-secondary" onclick="editNote(\'' + n.id + '\')" title="Modifier"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn btn-icon btn-danger" onclick="deleteNote(\'' + n.id + '\')" title="Supprimer"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></div><div class="card-body"><p class="note-text">' + escapeHtml(n.text) + '</p></div>'; if (n.secret && n.secret.trim()) { const sb = createSecretBlock(n.secret); if (sb) card.querySelector('.card-body').appendChild(sb); } notesList.appendChild(card); }); }
        function formatDate(iso) { return new Date(iso).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
        function renderAll() { renderChapters(); updateStats(); }
        function addChapter() { recordHistory(); const title = prompt('Titre du chapitre :'); if (!title) return; const ch = { id: generateId(), title: title.trim(), notes: [] }; state.chapters.push(ch); currentChapterId = ch.id; save(); renderAll(); showToast('Chapitre ajoute'); }
        $('noteForm').addEventListener('submit', e => { e.preventDefault(); const chapter = state.chapters.find(c => c.id === currentChapterId); if (!chapter) return; recordHistory(); const note = { id: editingNoteId || generateId(), text: $('noteText').value.trim(), category: $('noteCategory').value, secret: $('noteSecret').value.trim(), date: editingNoteId ? (chapter.notes.find(n => n.id === editingNoteId)?.date || new Date().toISOString()) : new Date().toISOString() }; if (editingNoteId) { const idx = chapter.notes.findIndex(n => n.id === editingNoteId); if (idx !== -1) chapter.notes[idx] = note; } else { chapter.notes.push(note); } save(); $('noteForm').reset(); editingNoteId = null; renderAll(); showToast('Note sauvegardee'); });
        window.editNote = function(id) { const chapter = state.chapters.find(c => c.id === currentChapterId); if (!chapter) return; const n = chapter.notes.find(x => x.id === id); if (!n) return; editingNoteId = id; $('noteText').value = n.text || ''; $('noteCategory').value = n.category || 'intrigue'; $('noteSecret').value = n.secret || ''; $('noteFormContainer').scrollIntoView({ behavior: 'smooth' }); };
        window.deleteNote = function(id) { if (!confirm('Supprimer cette note ?')) return; recordHistory(); const chapter = state.chapters.find(c => c.id === currentChapterId); if (chapter) { chapter.notes = chapter.notes.filter(n => n.id !== id); save(); renderAll(); showToast('Note supprimee'); } };
        $('themeToggleBtn').addEventListener('click', toggleTheme); $('focusModeBtn').addEventListener('click', toggleFocus); $('secretsToggleBtn').addEventListener('click', toggleSecrets); $('undoBtn').addEventListener('click', undo); $('searchInput').addEventListener('input', renderNotes); $('mobileMenuBtn').addEventListener('click', () => $('sidebar').classList.add('open')); $('mobileOverlay').addEventListener('click', () => $('sidebar').classList.remove('open'));
        $('exportBtn').addEventListener('click', () => { const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scriptorium_' + new Date().toISOString().slice(0,10) + '.json'; a.click(); showToast('Grimoire exporté'); });
        $('importBtn').addEventListener('click', () => $('importInput').click());
        $('importInput').addEventListener('change', e => { if (!e.target.files[0]) return; const fr = new FileReader(); fr.onload = ev => { try { state = { ...state, ...JSON.parse(ev.target.result) }; save(); renderAll(); showToast('Grimoire importé'); } catch(_) { showToast('Erreur d\'import'); } }; fr.readAsText(e.target.files[0]); });
        load(); buildNavigation(); renderAll();
    </script>
